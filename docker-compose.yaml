version: "3.2"
services:
  django: &django
    build:
      context: .
      dockerfile: ./docker/django/dev.Dockerfile
    depends_on:
      - postgres
    volumes:
      - type: bind
        source: ./
        target: /home/django/app/
    environment:
      - POSTGRES_USER=legal
      - DJANGO_PG_PASSWOR=datasvitend
      - DJANGO_PG_HOST=postgres
      - USE_DOCKER=yes
      - DJANGO_SETTINGS_MODULE=legal.settings
      - DOCKER=true
    env_file:
      - .env
    networks:
      - file_process

  dockerize:
    image: jwilder/dockerize
    platform: linux/amd64
    command: dockerize -wait tcp://postgres:5432 -timeout 10s
    depends_on:
      - postgres
    networks:
      - file_process

  celery:
    <<: *django
    command: celery -A legal worker -l info
    environment:
      - POSTGRES_USER=legal
      - DJANGO_PG_PASSWOR=datasvitend
      - CELERY_REDIS=redis://redis:6379
    depends_on:
      - dockerize
      - redis
    networks:
      - file_process

  celery_beat:
    <<: *django
    command: celery -A legal beat -l info
    environment:
      - POSTGRES_USER=legal
      - DJANGO_PG_PASSWOR=datasvitend
      - CELERY_REDIS=redis://redis:6379
    depends_on:
      - dockerize
      - redis
    networks:
      - file_process
    
  runserver:
    <<: *django
    command: python manage.py runserver 0.0.0.0:8000
    ports:
      - 8000:8000
    depends_on:
      - dockerize
      - celery
      - redis
    networks:
      - file_process

  postgres:
    build: ./docker/postgres
    environment:
      - POSTGRES_USER=legal
      - DJANGO_PG_PASSWOR=datasvitend
      - POSTGRES_HOST_AUTH_METHOD=trust
    ports:
      - "5432:5432"
    volumes:
    - type: bind
      source: ./postgres
      target: /tmp/
    networks:
      - file_process

  pgadmin:
    image: dpage/pgadmin4:4.14
    environment:
      PGADMIN_DEFAULT_EMAIL: "vjxzebra@gmail.com"
      PGADMIN_DEFAULT_PASSWORD: "datasvitend"
    ports:
      - "8800:80"
    depends_on:
      - postgres
    volumes:
    - type: bind
      source: ./postgres
      target: /var/lib/pgadmin/storage/vjxzebra_gmail.com
    networks:
      - file_process

  redis:
    image: redis:6
    ports:
      - 6380:6379
    networks:
      - file_process

networks:
  file_process:
    external: true