{% load static %}

<div class="shadow-[0_0_15px_rgba(0,0,0,0.1)] rounded-md p-5 w-full h-full flex flex-col items-end">
    <form class="w-full flex flex-col">
        <div class="flex items-center gap-5">
            <button type="button" id="uploadButton"
                    class="bg-transparent border border-green-700 text-green-700 hover:text-white hover:bg-green-700 px-6.5 py-2 rounded-md font-semibold transition-colors duration-300">
                Upload files
            </button>
            <span class="text-gray-590 text-3.5 font-normal">txt. max 5mb</span>
        </div>
        <div class="flex items-center justify-between mt-5">
            <select class="actions-select" name="action" required>
                <option value=""></option>
                {% for prompt in prompts %}
                <option value="{{ prompt.id }}">
                    {{ prompt.name }}::{{ prompt.description }}
                </option>
                {% endfor %}
            </select>

            <button type="submit"
                    class="flex gap-2.5 items-center px-6.5 py-2 rounded-md bg-transparent hover:bg-green-670 text-green-670 hover:text-white border border-green-670 transition-colors duration-300">

                <span class="text-3.5">Process</span>
            </button>
        </div>
    </form>
</div>

<script src="{% static 'js/gpt-document-translate.js' %}"></script>
