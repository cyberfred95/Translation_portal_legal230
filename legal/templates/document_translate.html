{% load static %}
{% load i18n %}

<!-- Main Content -->
<div class="flex p-4 px-6 flex-col items-end gap-6 self-stretch rounded-lg bg-white">
    <!-- Step Indicator -->
    <div class="flex items-start self-stretch">
        <!-- Step 1: Document -->
        <div class="flex flex-col items-start gap-3 flex-1">
            <!-- Status bar with circle and line -->
            <div class="flex pr-0.5 items-center gap-0.5 self-stretch">
                <!-- Circle with number -->
                <div class="step-indicator-1 flex w-6 h-6 justify-center items-center rounded-full border-0.5 border-[#166534]">
                    <span class="flex w-6 h-6 flex-col justify-center shrink-0 text-center font-poppins text-sm font-semibold leading-6 tracking-[-0.084px] text-[#166534]">
                        1
                    </span>
                </div>
                <!-- Connecting line -->
                <div class="h-0.5 flex-1 bg-black/10"></div>
            </div>
            <!-- Content -->
            <div class="flex pr-5 flex-col items-start gap-4 self-stretch">
                <div class="flex flex-col items-start gap-1.5 self-stretch">
                    <h3 class="self-stretch font-poppins text-lg font-semibold leading-6 tracking-[-0.252px] text-[#181932]">
                        {% trans 'Document' %}
                    </h3>
                </div>
            </div>
        </div>

        <!-- Step 2: Languages -->
        <div class="flex flex-col items-start gap-3 flex-1">
            <!-- Status bar with circle and line -->
            <div class="flex pr-0.5 items-center gap-0.5 self-stretch">
                <!-- Circle with number -->
                <div class="step-indicator-2 flex w-6 h-6 justify-center items-center rounded-full border-0.5 border-black/10">
                        <span class="flex w-6 h-6 flex-col justify-center shrink-0 text-center font-poppins text-sm font-semibold leading-6 tracking-[-0.084px] text-[#5A5A78]">
                            2
                        </span>
                </div>
                <!-- Connecting line -->
                <div class="h-0.5 flex-1 bg-black/10"></div>
            </div>
            <!-- Content -->
            <div class="flex pr-5 flex-col items-start gap-4 self-stretch">
                <div class="flex flex-col items-start gap-1.5 self-stretch">
                    <h3 class="self-stretch font-poppins text-lg font-semibold leading-6 tracking-[-0.252px] text-[#181932]">
                        {% trans 'Languages' %}
                    </h3>
                </div>
            </div>
        </div>

        <!-- Step 3: Field and Lexicon -->
        <div class="flex flex-col items-start gap-3 flex-1">
            <!-- Status bar with circle and line -->
            <div class="flex pr-0.5 items-center gap-0.5 self-stretch">
                <!-- Circle with number -->
                <div class="step-indicator-3 flex w-6 h-6 justify-center items-center rounded-full border-0.5 border-black/10">
                        <span class="flex w-6 h-6 flex-col justify-center shrink-0 text-center font-poppins text-sm font-semibold leading-6 tracking-[-0.084px] text-[#5A5A78]">
                            3
                        </span>
                </div>
                <!-- Connecting line -->
                <div class="h-0.5 flex-1 bg-black/10"></div>
            </div>
            <!-- Content -->
            <div class="flex pr-5 flex-col items-start gap-4 self-stretch">
                <div class="flex flex-col items-start gap-1.5 self-stretch">
                    <h3 class="self-stretch font-poppins text-lg font-semibold leading-6 tracking-[-0.252px] text-[#181932]">
                        {% trans 'Field and Lexicon' %}
                    </h3>
                </div>
            </div>
        </div>

        <!-- Step 4: Translation -->
        <div class="flex flex-col items-start gap-3">
            <!-- Status bar with circle -->
            <div class="flex pr-0.5 items-center gap-0.5 self-stretch">
                <!-- Circle with number -->
                <div class="step-indicator-4 flex w-6 h-6 justify-center items-center rounded-full border-0.5 border-black/10">
                        <span class="flex w-6 h-6 flex-col justify-center shrink-0 text-center font-poppins text-sm font-semibold leading-6 tracking-[-0.084px] text-[#5A5A78]">
                            4
                        </span>
                </div>
            </div>
            <!-- Content -->
            <div class="flex pr-5 flex-col items-start gap-4 self-stretch">
                <div class="flex flex-col items-start gap-1.5 self-stretch">
                    <h3 class="self-stretch font-poppins text-lg font-semibold leading-6 tracking-[-0.252px] text-[#181932]">
                        {% trans 'Translation' %}
                    </h3>
                </div>
            </div>
        </div>
    </div>


    <div class="w-full h-full py-7.5 px-5 step-container">
        {% include 'steps/step_1.html' %}
        {% include 'steps/step_2.html' %}
        {% include 'steps/step_3.html' %}
        {% include 'steps/step_4.html' %}
    </div>

    <div class="block-buttons flex justify-between w-full">
        <!-- Prev Button -->
        <button id="prev-step" disabled class="flex px-2.5 py-2 justify-center items-center rounded-full bg-white transition-all cursor-not-allowed text-gray-900 border border-black opacity-20">
            <!-- Arrow Left Icon SVG -->
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M21.0001 11.9999C21.0001 12.1988 20.9211 12.3896 20.7804 12.5303C20.6398 12.6709 20.449 12.7499 20.2501 12.7499H5.56041L11.0307 18.2193C11.1004 18.289 11.1557 18.3717 11.1934 18.4628C11.2311 18.5538 11.2505 18.6514 11.2505 18.7499C11.2505 18.8485 11.2311 18.9461 11.1934 19.0371C11.1557 19.1281 11.1004 19.2109 11.0307 19.2806C10.961 19.3502 10.8783 19.4055 10.7873 19.4432C10.6962 19.4809 10.5986 19.5003 10.5001 19.5003C10.4016 19.5003 10.304 19.4809 10.2129 19.4432C10.1219 19.4055 10.0392 19.3502 9.96948 19.2806L3.21948 12.5306C3.14974 12.4609 3.09443 12.3782 3.05668 12.2871C3.01894 12.1961 2.99951 12.0985 2.99951 11.9999C2.99951 11.9014 3.01894 11.8038 3.05668 11.7127C3.09443 11.6217 3.14974 11.539 3.21948 11.4693L9.96948 4.7193C10.1102 4.57857 10.3011 4.49951 10.5001 4.49951C10.6991 4.49951 10.89 4.57857 11.0307 4.7193C11.1715 4.86003 11.2505 5.05091 11.2505 5.24993C11.2505 5.44895 11.1715 5.63982 11.0307 5.78055L5.56041 11.2499H20.2501C20.449 11.2499 20.6398 11.3289 20.7804 11.4696C20.9211 11.6103 21.0001 11.801 21.0001 11.9999Z" fill="black" fill-opacity="0.8"/>
            </svg>
            <div class="flex px-2 justify-center items-center">
                <span class="font-poppins text-sm font-semibold leading-6 tracking-[-0.084px] text-gray-900">
                    {% trans 'Previous' %}
                </span>
            </div>
        </button>

        <!-- Next Button -->
        <button id="next-step" disabled class="flex px-2.5 py-2 justify-center items-center rounded-full bg-[#166534] transition-all opacity-50 cursor-not-allowed text-white">
            <div class="flex px-2 justify-center items-center">
                <span class="font-poppins text-sm font-semibold leading-6 tracking-[-0.084px] text-white">
                    {% trans 'Next' %}
                </span>
            </div>
            <!-- Arrow Right Icon SVG -->
            <svg class="w-6 h-6 text-white" width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M5 12H19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M12 5L19 12L12 19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </button>
    </div>
</div>

<script src="{% static 'js/document-translate.js' %}"></script>
