<div id="{{ modal_id }}" class="fixed inset-0 z-50 hidden overflow-y-auto bg-gray-800 bg-opacity-50 modal">
    <div class="flex items-center justify-center min-h-screen">
        <div class="bg-white rounded-lg shadow-lg w-{{ width|default:'96' }}">
            <!-- Header -->
            <div class="flex justify-between items-center border-b p-4">
                <h3 class="text-lg font-semibold">{{ title }}</h3>
                <button id="{{ modal_id }}-close" class="text-gray-500 hover:text-gray-700">&times;</button>
            </div>

            <!-- Body -->
            <div class="p-4">
                {{ content }}
            </div>

            <!-- Footer -->
            <div class="flex justify-end space-x-2 p-4 border-t">
                {{ footer }}
            </div>
        </div>
    </div>
</div>
