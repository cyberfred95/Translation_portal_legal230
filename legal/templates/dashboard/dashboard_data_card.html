<div class="dashboard-card">
  <div>
    <div class="stat-title">{{ title }}</div>
    <div class="stat-value"{% if data_original_count %} data-original-count="{{ data_original_count }}"{% endif %}>{{ value }}</div>
  </div>
  <div class="dashboard-icon-wrapper">
    <!-- Skeleton loader -->
    <span class="dashboard-icon-skeleton"></span>
    <!-- Anneau réel (caché initialement) -->
    {% with color=color_class %}
      {% if denominator == -1 %}
        <span class="dashboard-icon-ring {{ color }} has-tooltip dashboard-icon-content" style="--pct: 0; display: none;" data-pct="0" data-tooltip="{{ numerator }} / ∞">
          <span class="dashboard-icon" data-bg="{{ bg_color }}"><span class="icon-24 {{ color }}"><strong>∞</strong></span></span>
        </span>
      {% elif denominator > 0 %}
        {% widthratio numerator denominator 100 as pct_int %}
        <span class="dashboard-icon-ring {{ color }} has-tooltip dashboard-icon-content" style="--pct: 0; display: none;" data-pct="{{ pct_int }}" data-tooltip="{{ numerator }} / {{ denominator }}">
          <span class="dashboard-icon" data-bg="{{ bg_color }}"><span class="icon-24 {{ color }}"><strong>{{ pct_int }}%</strong></span></span>
        </span>
      {% else %}
        <span class="dashboard-icon-ring {{ color }} has-tooltip dashboard-icon-content" style="--pct: 0; display: none;" data-pct="0" data-tooltip="{{ numerator }} / {{ denominator }}">
          <span class="dashboard-icon" data-bg="{{ bg_color }}"><span class="icon-24 {{ color }}"><strong>0%</strong></span></span>
        </span>
      {% endif %}
    {% endwith %}
  </div>
 </div>
