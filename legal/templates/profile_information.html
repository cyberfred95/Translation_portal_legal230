{% load static %}
{% load i18n %}

<form name="change-user-data" method="post" class="w-full">
    {% csrf_token %}

    <!-- Form Fields -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
        <!-- First Name -->
        <div class="space-y-1">
            <label for="first_name" class="text-sm font-semibold text-gray-900 tracking-[-0.084px] leading-6">
                {% trans 'First Name' %}
            </label>
            <input
                    type="text"
                    name="first_name"
                    id="first_name"
                    value="{{ request.user.first_name|default:'' }}"
                    class="h-10 rounded-md border border-black/10 bg-white text-sm font-normal text-gray-900 tracking-[-0.084px] leading-6 focus:outline-none focus:ring-1 focus:ring-gray-900 px-3 w-full"
            />
        </div>

        <!-- Last Name -->
        <div class="space-y-1">
            <label for="last_name" class="text-sm font-semibold text-gray-900 tracking-[-0.084px] leading-6">
                {% trans 'Last Name' %}
            </label>
            <input
                    type="text"
                    name="last_name"
                    id="last_name"
                    value="{{ request.user.last_name|default:'' }}"
                    class="h-10 rounded-md border border-black/10 bg-white text-sm font-normal text-gray-900 tracking-[-0.084px] leading-6 focus:outline-none focus:ring-1 focus:ring-gray-900 px-3 w-full"
            />
        </div>

        <!-- Language -->
        <div class="space-y-1">
            <label for="language" class="text-sm font-semibold text-gray-900 tracking-[-0.084px] leading-6">
                {% trans 'Language' %}
            </label>
            <div class="relative">
                <select
                        name="language"
                        id="language"
                        class="h-10 rounded-md border border-black/10 bg-white text-sm font-normal text-gray-900 tracking-[-0.084px] leading-6 focus:outline-none focus:ring-1 focus:ring-gray-900 px-3 w-full appearance-none pr-10">
                    <option value="en-uk" {% if request.LANGUAGE_CODE == 'en' %}selected{% endif %}>
                    🇬🇧 English (UK)
                    </option>
                    <option value="en-us">
                        🇺🇸 English (US)
                    </option>
                    <option value="fr" {% if request.LANGUAGE_CODE == 'fr' %}selected{% endif %}>
                    🇫🇷 French
                    </option>
                    <option value="de">
                        🇩🇪 German
                    </option>
                </select>
                <!-- Chevron Down Icon -->
                <div class="absolute inset-y-0 right-3 flex items-center pointer-events-none">
                    <svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                    </svg>
                </div>
            </div>
        </div>
    </div>

    <!-- Email and Username Section -->
    <div class="space-y-4 mb-6">
        <!-- Username -->
        <div class="space-y-1">
            <label for="username" class="block text-sm font-semibold text-gray-900 tracking-[-0.084px] leading-6">
                {% trans 'Username' %}
            </label>
            <input
                    type="text"
                    name="username"
                    id="username"
                    value="{{ request.user.username }}"
                    class="h-10 rounded-md border border-black/10 bg-white text-sm font-normal text-gray-900 tracking-[-0.084px] leading-6 focus:outline-none focus:ring-1 focus:ring-gray-900 px-3 w-full max-w-md"
            />
        </div>

        <!-- Email -->
        <div class="space-y-1">
            <label for="email" class="block text-sm font-semibold text-gray-900 tracking-[-0.084px] leading-6">
                {% trans 'Email' %}
            </label>
            <input
                    type="email"
                    name="email"
                    id="email"
                    value="{{ request.user.email }}"
                    class="h-10 rounded-md border border-black/10 bg-white text-sm font-normal text-gray-900 tracking-[-0.084px] leading-6 focus:outline-none focus:ring-1 focus:ring-gray-900 px-3 w-full max-w-md"
            />
        </div>
    </div>

    <div class="mt-6 w-full flex justify-end">
        <button
                type="submit"
                class="h-10 px-4 py-2 bg-green-800 hover:bg-green-600 text-white text-sm font-semibold rounded-full tracking-[-0.084px] leading-6 flex items-center gap-2 transition-colors">
            {% trans 'Update Information' %}
        </button>
    </div>
</form>
