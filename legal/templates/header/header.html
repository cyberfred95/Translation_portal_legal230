    <!-- Right section - Actions and Profile -->
    <div class="flex justify-end items-center gap-1">

        <!-- Language switcher -->
        <div class="flex h-10 px-2 justify-center items-center rounded-md">
            <div class="flex items-center gap-1 ml-1">
                <span class="text-black w-[1.25rem] h-[1.25rem] mr-2">
                    <i class="ph ph-globe text-black"></i> &nbsp;
                </span>
                <span class="en {% if request.LANGUAGE_CODE == 'en' %}text-[#181932] font-medium{% else %}text-[#5a5a78] hover:text-[#181932] transition duration-300 ease-in-out{% endif %} cursor-pointer text-sm leading-6 tracking-[-0.084px]">
                    EN
                </span>
                <span class="text-[#5a5a78] text-sm">|</span>
                <span class="fr {% if request.LANGUAGE_CODE == 'fr' %}text-[#181932] font-medium{% else %}text-[#5a5a78] hover:text-[#181932] transition duration-300 ease-in-out{% endif %} cursor-pointer text-sm leading-6 tracking-[-0.084px]">
                    FR
                </span>
            </div>
        </div>

        <!-- Profile section -->
        <div class="flex h-10 px-2 justify-center items-center rounded-md">
            <div class="relative profile-container">
                <a href="{% url 'profile_details' %}" class="flex pr-1 justify-center items-center gap-2 cursor-pointer profile-trigger hover:bg-[#f8fafc] rounded-md transition-colors">
                    <div class="flex w-8 h-8 px-0.5 py-1 justify-center items-center rounded-full border-[0.5px] border-black/10 bg-[#f8fafc]">
                        <span class="text-[#5a5a78] text-center font-inter text-sm font-semibold leading-6 tracking-[-0.084px]">
                            {{ request.user.username|slice:":2"|upper }}
                        </span>
                    </div>
                </a>
            </div>
        </div>
    </div>
</header>

<script src="{% static 'js/header.js' %}"></script>
