{% load static %}
{% load i18n %}

<header class="header-wrapper">
    <div class="header-actions">
        <!-- Subscription Tag -->
        {% if user_subscription_info %}
        <div class="header-subscription-tag-wrapper">
            {% include 'common/subscription_tag.html' with subscription_info=user_subscription_info tag_class='header-subscription-tag' no_tooltip=True %}
        </div>
        {% endif %}

        <!-- Language switcher -->
        <div class="header-lang-switcher">
            <div class="header-lang-inner">
                <span class="header-lang-icon">
                    <i class="ph ph-globe"></i>
                </span>
                <span class="header-lang-link en {% if request.LANGUAGE_CODE == 'en' %}active{% else %}inactive{% endif %}">
                    EN
                </span>
                <span class="header-lang-separator">|</span>
                <span class="header-lang-link fr {% if request.LANGUAGE_CODE == 'fr' %}active{% else %}inactive{% endif %}">
                    FR
                </span>
            </div>
        </div>

        <!-- Profile section -->
        <div class="header-profile-container">
            <a href="{% url 'profile_details' %}" class="header-profile-trigger">
                <div class="header-profile-avatar">
                    <span class="header-profile-initials">
                        {{ request.user.username|slice:":2"|upper }}
                    </span>
                </div>
            </a>
        </div>
    </div>
</header>
