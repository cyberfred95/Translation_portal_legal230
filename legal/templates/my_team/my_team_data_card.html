{% load i18n %}

<div class="bg-white rounded-lg p-4 flex flex-col gap-2">
    <div class="flex justify-between items-center gap-2">
        <span class="text-muted-foreground text-base font-normal leading-6 tracking-[-0.176px] truncate flex-1">
            {{ title }}
        </span>
        <div class="w-10 h-10 rounded-full bg-{{ color }}-50 flex items-center justify-center flex-shrink-0">
            <i class="ph ph-{{ icon }} text-[20px] text-{{ color }}-600"></i>
        </div>
    </div>
    <span class="text-foreground text-2xl font-semibold leading-8 tracking-[-0.456px]">
        {{ value }}
    </span>
</div>
