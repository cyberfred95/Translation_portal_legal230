{% load i18n %}

<!-- Edit User Modal -->
<div id="edit-user-modal" class="myteam-modal hidden">
    <div class="myteam-modal-card">
        <!-- Header -->
        <div class="my-flex-row space-between gap-sm">
            <div class="my-flex-row gap-sm minw-0 flex-1">
                <i class="ph ph-user-gear icon-24 color-dark no-shrink"></i>
                <h1 class="modal-title my-ellipsis">
                    {% trans 'Edit user' %}
                </h1>
            </div>
            <button 
                type="button"
                id="close-edit-modal"
                class="btn-icon modal-close no-shrink"
                aria-label="Close modal"
            >
                <i class="ph ph-x icon-24 color-dark"></i>
            </button>
        </div>

        <!-- Form -->
        <form id="edit-user-form" method="POST" action="{% url 'my_team' %}" class="my-col gap-lg">
            {% csrf_token %}
            <input type="hidden" name="user_id" id="edit-user-id">
            
            <!-- Username Field -->
            <div class="my-col gap-sm">
                <label for="edit-username" class="form-label">
                    {% trans 'Username' %}
                </label>
                <input 
                    type="text" 
                    id="edit-username" 
                    name="username" 
                    required
                    class="form-input"
                >
            </div>

            <!-- Email Field -->
            <div class="my-col gap-sm">
                <label for="edit-email" class="form-label">
                    {% trans 'Email' %}
                </label>
                <input 
                    type="email" 
                    id="edit-email" 
                    name="email"
                    class="form-input"
                    placeholder="{% trans 'Optional' %}"
                >
            </div>

            <!-- Admin Checkbox -->
            <div class="my-flex-row gap-sm items-center">
                <input 
                    type="checkbox" 
                    id="edit-is-admin" 
                    name="is_admin"
                    class="checkbox no-shrink"
                >
                <label for="edit-is-admin" class="form-label my-ellipsis">
                    {% trans 'Administrator' %}
                </label>
            </div>

            <!-- Email Change Warning (with subscription) -->
            <div id="email-change-warning-active" class="hidden alert alert-amber">
                <i class="ph ph-warning icon-20 color-amber no-shrink mt-2"></i>
                <p class="alert-text clamp-3">
                    {% trans 'An invitation email will be sent to the new email address.' %}
                </p>
            </div>

            <!-- Email Change Warning (no subscription) -->
            <div id="email-change-warning-inactive" class="hidden alert alert-red">
                <i class="ph ph-warning-circle icon-20 color-red no-shrink mt-2"></i>
                <p class="alert-text clamp-3">
                    {% trans 'No invitation email will be sent because this user has no active subscription.' %}
                </p>
            </div>

            <!-- Actions -->
            <div class="actions-row">
                <button 
                    type="button"
                    id="cancel-edit"
                    class="btn btn-secondary"
                >
                    {% trans 'Cancel' %}
                </button>
                <button 
                    type="submit"
                    class="btn btn-primary-solid"
                >
                    {% trans 'Save changes' %}
                </button>
            </div>
        </form>
    </div>
</div>
