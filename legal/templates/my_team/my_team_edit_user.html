{% load i18n %}

<!-- Edit User Modal -->
<div id="edit-user-modal" class="fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50 hidden">
    <div class="bg-white rounded-lg flex flex-col gap-6 p-6 pb-8" style="width: 45%;">
        <!-- Header -->
        <div class="flex justify-between items-center gap-2">
            <div class="flex items-center gap-2 min-w-0 flex-1">
                <i class="ph ph-user-gear text-gray-900 flex-shrink-0" style="font-size: 24px;"></i>
                <h1 class="font-poppins text-2xl font-bold text-gray-900 leading-8 tracking-[-0.456px]" style="overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">
                    {% trans 'Edit user' %}
                </h1>
            </div>
            <button 
                type="button"
                id="close-edit-modal"
                class="flex items-center justify-center p-2 rounded-lg hover:bg-gray-100 transition-colors flex-shrink-0"
                aria-label="Close modal"
            >
                <i class="ph ph-x" style="font-size: 24px; color: rgba(0,0,0,0.8);"></i>
            </button>
        </div>

        <!-- Form -->
        <form id="edit-user-form" method="POST" action="{% url 'my_team' %}" class="flex flex-col gap-6">
            {% csrf_token %}
            <input type="hidden" name="user_id" id="edit-user-id">
            
            <!-- Username Field -->
            <div class="flex flex-col gap-2">
                <label for="edit-username" class="font-poppins text-sm font-medium text-gray-700">
                    {% trans 'Username' %}
                </label>
                <input 
                    type="text" 
                    id="edit-username" 
                    name="username" 
                    required
                    class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent"
                    style="font-family: 'Poppins', sans-serif; font-size: 14px;"
                >
            </div>

            <!-- Email Field -->
            <div class="flex flex-col gap-2">
                <label for="edit-email" class="font-poppins text-sm font-medium text-gray-700">
                    {% trans 'Email' %}
                </label>
                <input 
                    type="email" 
                    id="edit-email" 
                    name="email"
                    class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent"
                    style="font-family: 'Poppins', sans-serif; font-size: 14px;"
                    placeholder="{% trans 'Optional' %}"
                >
            </div>

            <!-- Admin Checkbox -->
            <div class="flex items-center gap-2">
                <input 
                    type="checkbox" 
                    id="edit-is-admin" 
                    name="is_admin"
                    class="w-4 h-4 text-green-600 border-gray-300 rounded focus:ring-green-500 flex-shrink-0"
                >
                <label for="edit-is-admin" class="font-poppins text-sm font-medium text-gray-700" style="overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">
                    {% trans 'Administrator' %}
                </label>
            </div>

            <!-- Email Change Warning (with subscription) -->
            <div id="email-change-warning-active" class="hidden flex items-start gap-2 p-3 bg-amber-50 border border-amber-200 rounded-md">
                <i class="ph ph-warning text-amber-600 flex-shrink-0" style="font-size: 20px; margin-top: 2px;"></i>
                <p class="text-sm text-amber-800" style="font-family: 'Poppins', sans-serif; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 3; line-clamp: 3; -webkit-box-orient: vertical;">
                    {% trans 'An invitation email will be sent to the new email address.' %}
                </p>
            </div>

            <!-- Email Change Warning (no subscription) -->
            <div id="email-change-warning-inactive" class="hidden flex items-start gap-2 p-3 bg-red-50 border border-red-200 rounded-md">
                <i class="ph ph-warning-circle text-red-600 flex-shrink-0" style="font-size: 20px; margin-top: 2px;"></i>
                <p class="text-sm text-red-800" style="font-family: 'Poppins', sans-serif; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 3; line-clamp: 3; -webkit-box-orient: vertical;">
                    {% trans 'No invitation email will be sent because this user has no active subscription.' %}
                </p>
            </div>

            <!-- Actions -->
            <div class="flex justify-end gap-3 pt-4">
                <button 
                    type="button"
                    id="cancel-edit"
                    class="px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-md hover:bg-gray-50 transition-colors"
                    style="font-family: 'Poppins', sans-serif; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;"
                >
                    {% trans 'Cancel' %}
                </button>
                <button 
                    type="submit"
                    class="px-4 py-2 text-sm font-medium text-white bg-green-800 rounded-md hover:bg-green-700 transition-colors"
                    style="font-family: 'Poppins', sans-serif; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;"
                >
                    {% trans 'Save changes' %}
                </button>
            </div>
        </form>
    </div>
</div>
