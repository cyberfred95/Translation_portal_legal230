{% load static %}
{% load i18n %}

<div class="shadow-[0_0_15px_rgba(0,0,0,0.1)] rounded-md p-5 w-full h-full flex flex-col items-end">
    <form class="w-full flex flex-col">
        <textarea id="text" name="text" style="display: none;"></textarea>
        <input type="hidden" name="action" value="text_translate">
        {% csrf_token %}
        <div class="flex w-full gap-1">
            <div class="w-full flex flex-col gap-4 item-center">
                <div class="flex gap-2 items-start">
                    <button id="detect-language"
                            type="button"
                            class="text-3.5 flex gap-2.5 items-center px-7.5 py-0.5 rounded-2.5 bg-transparent font-normal hover:bg-gray-600 text-gray-600 hover:text-white border border-gray-600 transition duration-300 ease-in-out">
                        {% trans 'Detect language' %}
                    </button>
                    <select class="source-language" name="source_language" required>
                        <option value=""></option>
                        {% for translate_language in translate_languages %}
                        <option value="{{ translate_language.abbreviation|lower }}">
                            {% if request.LANGUAGE_CODE == 'fr' and translate_language.french_name %}
                            {{ translate_language.french_name }}
                            {% else %} {{ translate_language.name }}
                            {% endif %}
                        </option>
                        {% endfor %}
                    </select>
                </div>
                <div class="relative">
                    <div id="source-text"
                         class="focus:border-transparent focus:ring-0 rounded bg-gray-100 p-5 pr-10 text-gray-600 resize-none w-full placeholder:text-gray-300 overflow-hidden">
                    </div>
                    <svg id="clear" class="absolute top-5 right-5 cursor-pointer" width="14" height="14"
                         viewBox="0 0 14 14"
                         fill="none" xmlns="http://www.w3.org/2000/svg">

                              fill="#0D2B40"

                        />
                    </svg>
                </div>
            </div>
            <div class="w-full flex flex-col gap-4">
                <select class="target-language" name="target_language" required>
                    <option value=""></option>
                    {% for translate_language in translate_languages %}
                    <option value="{{ translate_language.abbreviation|lower }}">
                        {% if request.LANGUAGE_CODE == 'fr' and translate_language.french_name %}
                        {{ translate_language.french_name }}
                        {% else %} {{ translate_language.name }}
                        {% endif %}
                    </option>
                    {% endfor %}
                </select>
                <div class="relative">
                    <div id="translated-text"
                         class="focus:border-transparent focus:ring-0 rounded bg-gray-100 p-5 pr-10 text-gray-600 resize-none w-full placeholder:text-gray-300 overflow-hidden">
                    </div>

                        fill="none" xmlns="http://www.w3.org/2000/svg">

                                  fill="#0D2B40"/>

                        </g>
                        <defs>
                            <clipPath id="clip0_841_13004">
                                <rect width="30" height="30" fill="white"/>
                            </clipPath>
                        </defs>
                    </svg>
                    <div id="tooltip"
                         class="invisible opacity-0 transition-opacity duration-300 absolute z-10 py-2.5 px-4 bg-gray-600 text-white text-2.75 rounded-md -top-8 right-0 transform">
                        <span class="text-justify text-wrap block text-3">{% trans 'Copied' %}</span>
                        <div class="absolute w-3 h-3 bg-gray-600 transform rotate-45 left-1/2 -translate-x-1/2 -bottom-1.5"></div>
                    </div>
                </div>
            </div>
        </div>
        <div class="flex items-center justify-between mt-5">
            <select class="domain-select" name="domain_name" required>
                <option value=""></option>
            </select>

            <button type="submit"
                    class="flex gap-2.5 items-center px-6.5 py-2 rounded-md bg-transparent hover:bg-green-700 text-green-700 hover:text-white border border-green-700 transition-colors duration-300">

                <span class="text-3.5">{% trans 'Translate' %}</span>
            </button>
        </div>
    </form>
</div>
