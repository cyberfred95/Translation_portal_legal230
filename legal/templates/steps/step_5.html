{% load static %}

<div class="step-5 hidden">
    <span class="text-4 text-gray-800 font-semibold">Review</span>
    <table class="table-auto mt-5 w-full border-separate border-spacing-y-5 translated projects">
        <tbody>

        </tbody>
    </table>
    <div id="modal-revision"
         class="fixed inset-0 bg-gray-600 bg-opacity-50 overflow-y-auto h-full w-full hidden flex items-center justify-center">
        <div class="relative bg-white rounded-lg shadow-xl max-w-172.5 w-full mx-4">
            <div class="absolute -top-4.5 -right-4.5 -mr-4 -mt-4 z-10">
                <button id="close-revision" class="p-2 text-gray-600 hover:text-gray-900 focus:outline-none">
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M11.7688 10.0003L19.6335 2.13553C20.1222 1.64732 20.1222 0.855171 19.6335 0.36696C19.1449 -0.121669 18.3536 -0.121669 17.865 0.36696L10.0002 8.23171L2.13504 0.36696C1.64641 -0.121669 0.8551 -0.121669 0.366471 0.36696C-0.122157 0.855171 -0.122157 1.64732 0.366471 2.13553L8.23164 10.0003L0.366471 17.865C-0.122157 18.3532 -0.122157 19.1454 0.366471 19.6336C0.610786 19.8775 0.930979 19.9997 1.25076 19.9997C1.57053 19.9997 1.89073 19.8775 2.13504 19.6332L10.0002 11.7684L17.865 19.6332C18.1093 19.8775 18.4295 19.9997 18.7492 19.9997C19.069 19.9997 19.3892 19.8775 19.6335 19.6332C20.1222 19.145 20.1222 18.3528 19.6335 17.8646L11.7688 10.0003Z"
                              fill="white"/>
                    </svg>
                </button>
            </div>

            <div class="p-12.5 flex flex-col items-center gap-7.5">
                <div class="text-5 font-semibold text-gray-800">Quote for revision</div>
                <span class="text-center text-3.5 text-gray-800">By choosing the options below, you agree that you are sending a request for Quote  of the selected service to Legal230</span>
                <button
                        type="button"
                        data-translated-file="{{ project.translated_file }}"
                        data-id="{{ project.id }}"
                        class="flex gap-2.5 items-center text-gray-800 border border-gray-800 rounded-md px-2.5 py-3 text-3.25 disabled:pointer-events-none disabled:text-gray-300 disabled:border-gray-300 expert-revision">
                    Expert revision
                    <div class="relative group">
                        <svg width="20" height="20" viewBox="0 0 20 20" fill="none"
                             xmlns="http://www.w3.org/2000/svg">
                            <path d="M10 0C4.47301 0 0 4.4725 0 10C0 15.5269 4.4725 20 10 20C15.527 20 20 15.5275 20 10C20 4.47309 15.5275 0 10 0ZM11.0269 13.9696C11.0269 14.2855 10.5662 14.6014 10.0002 14.6014C9.40785 14.6014 8.98668 14.2855 8.98668 13.9696V8.95445C8.98668 8.5859 9.40789 8.33574 10.0002 8.33574C10.5662 8.33574 11.0269 8.5859 11.0269 8.95445V13.9696ZM10.0002 7.12484C9.39473 7.12484 8.9209 6.6773 8.9209 6.17707C8.9209 5.67687 9.39477 5.2425 10.0002 5.2425C10.5926 5.2425 11.0665 5.67687 11.0665 6.17707C11.0665 6.6773 10.5925 7.12484 10.0002 7.12484Z"
                                  fill="currentColor"/>
                        </svg>
                        <div class="invisible group-hover:visible opacity-0 group-hover:opacity-100 transition-opacity duration-300 absolute z-10 w-48 py-3 px-4.5 bg-gray-800 text-white text-2.75 rounded-md bottom-26 left-1/2 transform -translate-x-1/2 translate-y-full">
                            <span class="text-justify text-wrap block">
                                Post-editing by professional editors
                            </span>
                            <div class="absolute w-3 h-3 bg-gray-800 transform rotate-45 left-1/2 -translate-x-1/2 -bottom-1.5"></div>
                        </div>
                    </div>
                </button>
            </div>

            <input type="file" class="hidden glossary-file" accept=".csv">
        </div>
    </div>
</div>
