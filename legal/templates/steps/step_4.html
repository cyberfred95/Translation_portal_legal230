{% load static %}

<div class="step-4 hidden">
    <div class="flex items-center w-full justify-between">
        <span class="text-4 text-gray-800 font-semibold">Terminology</span>
        <button id="openModal" type="button" class="text-3 text-green-700 add-glossary-btn hidden">+ Add glossary</button>
    </div>
    <div class="flex items-center mt-5">
        <button type="button"
                class="glossary-tab default px-5 py-3 text-3.5 bg-gray-160 text-gray-550 rounded-l-md hover:bg-gray-800 hover:text-white focus:bg-gray-800 focus:text-white">
            Default
        </button>
        <button type="button"
                class="glossary-tab my-glossary px-5 py-3 text-3.5 bg-gray-160 text-gray-550 hover:bg-gray-800 hover:text-white focus:bg-gray-800 focus:text-white">
            My glossaries
        </button>
        <button type="button"
                class="glossary-tab none px-5 py-3 text-3.5 bg-gray-160 text-gray-550 rounded-r-md hover:bg-gray-800 hover:text-white focus:bg-gray-800 focus:text-white">

            No glossary
        </button>
    </div>
    <div class="flex flex-wrap gap-2.5 mt-5 glossary-list"></div>
    <div id="modal"
         class="fixed inset-0 bg-gray-600 bg-opacity-50 overflow-y-auto h-full w-full hidden flex items-center justify-center">
        <div class="relative bg-white rounded-lg shadow-xl max-w-172.5 w-full mx-4">
            <div class="absolute -top-4.5 -right-4.5 -mr-4 -mt-4 z-10">
                <button type="button" id="closeIcon" class="p-2 text-gray-600 hover:text-gray-900 focus:outline-none">
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M11.7688 10.0003L19.6335 2.13553C20.1222 1.64732 20.1222 0.855171 19.6335 0.36696C19.1449 -0.121669 18.3536 -0.121669 17.865 0.36696L10.0002 8.23171L2.13504 0.36696C1.64641 -0.121669 0.8551 -0.121669 0.366471 0.36696C-0.122157 0.855171 -0.122157 1.64732 0.366471 2.13553L8.23164 10.0003L0.366471 17.865C-0.122157 18.3532 -0.122157 19.1454 0.366471 19.6336C0.610786 19.8775 0.930979 19.9997 1.25076 19.9997C1.57053 19.9997 1.89073 19.8775 2.13504 19.6332L10.0002 11.7684L17.865 19.6332C18.1093 19.8775 18.4295 19.9997 18.7492 19.9997C19.069 19.9997 19.3892 19.8775 19.6335 19.6332C20.1222 19.145 20.1222 18.3528 19.6335 17.8646L11.7688 10.0003Z"
                              fill="white"/>
                    </svg>
                </button>
            </div>

            <div class="p-12.5 flex flex-col items-center gap-7.5">
                <div class="text-5">Add Glossary</div>
                <div class="bg-gray-350 w-full py-5 px-46.75 rounded-md">
                    <div id="uploadButtons" class="flex flex-col gap-2.5">
                        <button type="button" id="uploadButton"
                                class="w-full bg-green-700 text-white py-2.5 rounded font-semibold">
                            Upload file
                        </button>
                        <div id="fileInfo"
                             class="hidden flex gap-4 items-center justify-between px-4 py-3 rounded-md bg-green-350 text-green-650 w-full">

                            <span id="fileName"></span>
                            <button type="button" class="remove-file">
                                <svg width="20" height="20" viewBox="0 0 20 20" fill="none"
                                     xmlns="http://www.w3.org/2000/svg">
                                    <g clip-path="url(#clip0_759_4082)">
                                        <path d="M10 20C15.5229 20 20 15.5229 20 10C20 4.47716 15.5229 0 10 0C4.47716 0 0 4.47716 0 10C0 15.5229 4.47716 20 10 20Z"
                                              fill="#176C77"/>
                                        <path d="M14.5625 14.5625C14.1875 14.9375 13.5625 14.9375 13.1875 14.5625L9.99998 11.375L6.81249 14.5625C6.43751 14.9375 5.81247 14.9375 5.43749 14.5625C5.0625 14.1875 5.0625 13.5625 5.43749 13.1875L8.62498 9.99998L5.43749 6.81249C5.0625 6.43751 5.0625 5.81247 5.43749 5.43749C5.81247 5.0625 6.43751 5.0625 6.81249 5.43749L9.99998 8.62498L13.1875 5.43749C13.5625 5.0625 14.1875 5.0625 14.5625 5.43749C14.9375 5.81247 14.9375 6.43751 14.5625 6.81249L11.375 9.99998L14.5625 13.1875C14.9375 13.5625 14.9375 14.1874 14.5625 14.5625Z"
                                              fill="white"/>
                                    </g>
                                    <defs>
                                        <clipPath id="clip0_759_4082">
                                            <rect width="20" height="20" fill="white"/>
                                        </clipPath>
                                    </defs>
                                </svg>
                            </button>
                        </div>
                        <a href="{% static 'Gloss_en-de.csv' %}" type="button" id="downloadSample"
                                class="w-full bg-white text-green-650 bg-green-650 py-2.5 rounded border border-green-650 font-semibold">
                            Download sample
                        </a>
                        <p class="text-3.5 text-gray-270">Supported Files: .csv max 5mb</p>
                    </div>
                </div>
                <span class="text-3.5 text-gray-750 text-center">
                    The glossary function is based on the GPT. The number of tokens used for editing terminology can be found in the Usage History section.
                </span>
                <button type="button" id="continueButton"
                        class="bg-gray-800 px-6.5 py-2.5 rounded font-semibold text-4 text-white">

                    Continue
                </button>
            </div>

            <input type="file" class="hidden glossary-file" accept=".csv">
        </div>
    </div>
</div>
