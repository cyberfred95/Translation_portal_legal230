<!DOCTYPE html>
{% load i18n %}
{% load static %}
<html lang="{{ request.LANGUAGE_CODE }}">
<head>
    <meta charset="UTF-8">
    <title>Legal230</title>
    <!-- FONT -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- TAILWIND -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- JQUERY -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/jquery/latest/jquery.min.js"></script>
    <!-- SELECT -->
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet"/>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
   <!-- STYLES-->
    <link href="{% static 'css/main.css' %}" rel="stylesheet">

    <script>
        const generateTailwindSizes = () => {
            const sizes = {};
            for (let px = 0; px <= 2000; px++) {
                const tailwindName = (px / 4);
                const remValue = (px / 16).toFixed(3);
                sizes[tailwindName] = `${remValue}rem`;
            }
            return sizes;
        }

        tailwind.config = {
            theme: {
                extend: {
                    screens: {
                        'xs': '320px',
                        'sm': '576px',
                        'md': '768px',
                        'lg': '1024px',
                        'xl': '1280px',
                        '2xl': '1536px',
                        '3xl': '1920px',
                    },
                    fontFamily: {
                        'montserrat': ['Montserrat', 'sans-serif'],
                    },
                    colors: {
                        gray: {
                            25: '#F8F9FA',
                            50: '#F5F7F7',
                            75: '#EAF0F6',
                            100: '#F2F3F5',
                            125: '#EBEFF0',
                            150: '#EAECEE',
                            175: '#EAECED',
                            200: '#E4E8EA',
                            225: '#D5DADE',
                            250: '#D9D9D9',
                            275: '#CFD5D9',
                            300: '#CAD1D6',
                            325: '#CACACA',
                            350: '#AFB9C1',
                            375: '#AAB4BD',
                            400: '#9EAAB3',
                            425: '#808E9B',
                            475: '#7A8B98',
                            500: '#556A7B',
                            525: '#566B79',
                            550: '#2A4459',
                            575: '#2B4459',
                            600: '#0D2B40',
                        },
                        green: {
                            50: '#E6F8F6',
                            100: '#E8F0F1',
                            150: '#E7F0F1',
                            200: '#DFEAEC',
                            250: '#B9D3D6',
                            300: '#00BBA7',
                            350: '#74A7AD',
                            400: '#176C77',
                            450: '#346C77',
                            500: '#156D77',
                        },
                        red: {
                            100: '#FFEFEF',
                            150: '#FFF7F7',
                            200: '#FFE0DF',
                            400: '#FD625E',
                        },
                        yellow: {
                            100: '#FCF9ED',
                            400: '#D4A600',
                        },
                        blue: {
                            100: '#E9F4FF',
                            400: '#1E90FF',
                        },
                    },
                    fontSize: generateTailwindSizes(),
                    width: generateTailwindSizes(),
                    maxWidth: generateTailwindSizes(),
                    height: generateTailwindSizes(),
                    padding: generateTailwindSizes(),
                    margin: generateTailwindSizes(),
                    inset: generateTailwindSizes(),
                    spacing: generateTailwindSizes(),
                    borderRadius: generateTailwindSizes(),
                    borderWidth: generateTailwindSizes(),
                    divideWidth: generateTailwindSizes(),
                    gap: generateTailwindSizes(),
                }
            }
        }
    </script>
</head>
<body class="font-montserrat font-medium">

<div class="flex h-screen overflow-hidden">
    <!-- Sidebar -->
    <div class="flex-shrink-0">
        {% include 'sidebar.html' %}
    </div>

    <!-- Main content -->
    <div class="flex-1 flex flex-col overflow-hidden">
        <!-- Header -->
        {% include 'header.html' %}

        <!-- Scrollable content -->
        <main class="flex-1 overflow-y-auto">
            {% block content %}
            <!-- Page content -->
            {% endblock %}
        </main>
    </div>
    <div id="modal-error"
         class="fixed inset-0 bg-gray-425 bg-opacity-50 overflow-y-auto h-full w-full hidden flex items-center justify-center">
        <div class="relative bg-white rounded-lg shadow-xl max-w-172.5 w-full mx-4">
            <div class="absolute -top-4.5 -right-4.5 -mr-4 -mt-4 z-10">
                <button type="button" id="close-modal-error" class="p-2 text-gray-425 hover:text-gray-900 focus:outline-none">
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M11.7688 10.0003L19.6335 2.13553C20.1222 1.64732 20.1222 0.855171 19.6335 0.36696C19.1449 -0.121669 18.3536 -0.121669 17.865 0.36696L10.0002 8.23171L2.13504 0.36696C1.64641 -0.121669 0.8551 -0.121669 0.366471 0.36696C-0.122157 0.855171 -0.122157 1.64732 0.366471 2.13553L8.23164 10.0003L0.366471 17.865C-0.122157 18.3532 -0.122157 19.1454 0.366471 19.6336C0.610786 19.8775 0.930979 19.9997 1.25076 19.9997C1.57053 19.9997 1.89073 19.8775 2.13504 19.6332L10.0002 11.7684L17.865 19.6332C18.1093 19.8775 18.4295 19.9997 18.7492 19.9997C19.069 19.9997 19.3892 19.8775 19.6335 19.6332C20.1222 19.145 20.1222 18.3528 19.6335 17.8646L11.7688 10.0003Z"
                              fill="white"/>
                    </svg>
                </button>
            </div>

            <div class="p-12.5 flex flex-col items-center gap-5">
                <div class="text-5 font-semibold">Error</div>
                <span class="text-center text-3.5">Something went wrong</span>
                <button
                        type="button"
                        class="reload w-40 text-gray-500 border border-gray-500 rounded-md px-2.5 py-3 text-3.25 disabled:pointer-events-none disabled:text-gray-225 disabled:border-gray-225 expert-revision">
                    OK
                </button>
            </div>
        </div>
    </div>
</div>

<script src="{% static 'js/get-cookie.js' %}"></script>
<script src="{% static 'js/index.js' %}"></script>

{% block extra_js %} {% endblock %}
</body>
</html>
