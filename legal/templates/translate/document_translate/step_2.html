{% load static %}
{% load i18n %}
<div class="step-2 hidden flex flex-col justify-between divide-x-0.5 divide-gray-200">

    <div class="bg-white rounded-lg p-4 sm:p-6 w-full">
        <!-- Language selection and controls -->
        <div class="flex flex-col justify-between mb-0 gap-4 sm:gap-0 pt-4">
            <!-- Left side - Language selection -->
            <div class="flex items-center w-full gap-4 sm:gap-8 lg:gap-12 overflow-x-auto">
                <!-- Detected Language Tab -->
                <div class="flex items-center w-1/2 gap-2">
                    <div class="relative border-b border-gray-100 flex-1">
                        <div class="flex items-center gap-2 px-0 py-2 text-sm font-medium text-gray-900">
                            <select class="gray-text-select document-source-language" name="source_language" required data-default-value="FR">
                                <option value="" disabled selected>{% trans 'Detected language' %}</option>
                                {% for translate_language in translate_languages %}
                                <option value="{{ translate_language.abbreviation|lower }}">
                                    {% if request.LANGUAGE_CODE == 'fr' and translate_language.french_name %}
                                    {{ translate_language.french_name }}
                                    {% else %}
                                    {{ translate_language.name }}
                                    {% endif %}
                                </option>
                                {% endfor %}

                            </select>
                        </div>
                        <div class="absolute bottom-0 left-0 right-0 h-px bg-gray-900"></div>
                    </div>
                    <!-- Language Detection Spinner -->
                    <div id="language-detection-spinner" class="hidden">
                        <i class="ph ph-circle-notch text-[#166534] animate-spin" style="font-size: 24px;"></i>
                    </div>
                </div>

                <!-- Target Language Tab -->
                <div class="flex items-center gap-6 w-1/2">
                    <div class="relative">
                        <div class="flex items-center gap-2 px-0 py-2 text-sm font-medium text-gray-900">
                            <select class="document-target-language" name="target_language" required
                                    data-default-value="en">
                                {% for translate_language in translate_languages %}
                                <option value="{{ translate_language.abbreviation|lower }}">
                                    {% if request.LANGUAGE_CODE == 'fr' and translate_language.french_name %}
                                    {{ translate_language.french_name }}
                                    {% else %}
                                    {{ translate_language.name }}
                                    {% endif %}
                                </option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="absolute bottom-0 left-0 right-0 h-px bg-gray-900"></div>
                    </div>
                </div>
            </div>

        </div>

        <!-- Translation area -->
        <div class="flex flex-col lg:flex-row gap-0 mt-0 relative">

            <div class="md:flex-2 2xl:flex-1 pr-4 pt-4 border-t-0.25 border-gray-100 pt-4">
                <div class="flex items-start justify-start flex-col gap-5 detective-language-list"></div>
            </div>

            <!-- Divider -->
            <div class="w-full h-px lg:w-px lg:h-auto bg-gray-100 mb-4 lg:mb-6"></div>


            <div class="search-box flex-1 flex-col w-1/2 pl-4 flex items-center justify-center pt-4 border-t-0.25 border-gray-100">
                <!-- Search Input -->
                <div class="flex-1 relative w-full mb-2 pt-4">
                    <div class="relative">
                        <svg class="absolute left-3 top-1/2 h-5 w-5 -translate-y-1/2 text-gray-400"
                             fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                  d="m21 21-6-6m2-5a7 7 0 1 1-14 0 7 7 0 0 1 14 0Z"></path>
                        </svg>
                        <input
                                id="search-input"
                                placeholder="{% trans 'Search for text or document...' %}"
                                class="pl-10 h-8 text-sm text-gray-600 placeholder:text-gray-500 border border-gray-300 rounded-md w-full focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                        />
                    </div>
                </div>

                <div class="flex flex-row w-full flex-wrap">
                    {% for translate_language in translate_languages %}
                    <div class="flex w-1/3 p-2 items-center language-item" data-value="{{ translate_language.abbreviation|lower }}">
                        <div class="flex items-center">
                            <div class="w-8">
                                <div class="hidden">
                                    <i class="ph ph-check text-green-800"></i>
                                </div>
                            </div>
                            <div class="w-1/2">
                                <div class="hidden">
                                    {% include 'svg/icons/star.svg' %}
                                </div>
                            </div>
                        </div>
                        <div class="flex items-center">
                            {% if request.LANGUAGE_CODE == 'fr' and translate_language.french_name %}
                            <div class="language">{{ translate_language.french_name }}</div>
                            {% else %}
                            <div>{{ translate_language.name }}</div>
                            {% endif %}
                        </div>
                    </div>
                    {% endfor %}
                </div>

            </div>

        </div>
    </div>



</div>
