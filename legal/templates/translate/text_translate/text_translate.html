{% load static %}
{% load i18n %}

<div class="text-translate-form-wrapper">
    <form name="text-translate" class="text-translate-form {% if user_subscription_info and user_subscription_info.status != 'active' %}subscription-error-container{% endif %}">
        <textarea id="text" name="text" class="hidden-textarea"></textarea>
        <input type="hidden" name="action" value="text_translate">
        {% csrf_token %}
        
        <div class="text-translate-main-row">
            <!-- Colonne gauche : Source -->
            <div class="text-translate-column text-translate-column-left">
                <div class="text-translate-column-selector text-translate-source-selector">
                    <div class="text-translate-select-wrapper">
                        <select class="source-language" name="source_language" required>
                            <option value=""></option>
                            {% for translate_language in translate_languages %}
                            <option value="{{ translate_language.abbreviation|lower }}">
                                {% if request.LANGUAGE_CODE == 'fr' and translate_language.french_name %}
                                {{ translate_language.french_name }}
                                {% else %} {{ translate_language.name }}
                                {% endif %}
                            </option>
                            {% endfor %}
                        </select>
                        <div class="text-detect-btn-wrapper">
                            <button type="button"
                                    id="detect-language"
                                    class="text-translate-detect-btn"
                                    aria-label="{% trans 'Detect language' %}">
                                <i class="ph ph-translate"></i>
                            </button>
                            <div class="text-detect-tooltip">
                                <span>{% trans 'Language detection' %}</span>
                            </div>
                        </div>
                        <div id="text-detect-status"
                             class="text-detect-status text-detect-status--hidden"
                             data-message-success="{% trans 'Language detected' %}"
                             data-message-error="{% trans 'Language detection error' %}">
                            <i class="ph ph-circle-notch text-detect-spinner"></i>
                            <span class="text-detect-label"></span>
                        </div>
                    </div>
                    <div class="text-detect-btn-wrapper">
                        <button type="button"
                                id="instructions-modal-btn"
                                class="text-translate-force-btn instructions-btn-with-indicator"
                                aria-label="{% trans 'Translation instructions' %}">
                            <i class="ph ph-note-pencil"></i>
                            <span id="instructions-indicator" class="instructions-indicator"></span>
                        </button>
                        <div class="text-detect-tooltip">
                            <span>{% trans 'Custom instructions' %}</span>
                        </div>
                    </div>
                    <button type="button"
                            id="sync-target-to-source"
                            class="text-translate-force-btn"
                            aria-label="{% trans 'Copy target language to source' %}">
                        <i class="ph ph-arrows-left-right"></i>
                    </button>
                </div>

                <div class="text-translate-editor-wrapper">
                    <div id="source-text" class="text-translate-editor text-translate-editor-source"></div>
                    <button type="button" id="clear-source" class="text-translate-clear-btn">
                        <i class="ph ph-x text-translate-icon"></i>
                    </button>
                </div>

                <div class="text-translate-actions">
                    <div class="text-translate-char-count">
                        <span id="source-char-count">0</span> / 2000
                    </div>
                    <div>
                        <button type="submit" id="btn-translate" disabled class="text-translate-submit-btn">
                            <span class="text-translate-submit-text">{% trans 'Translate' %}</span>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Colonne droite : Destination -->
            <div class="text-translate-column text-translate-column-right">
                <div class="text-translate-column-selectors-row">
                    <div class="text-translate-column-selector">
                        <select class="target-language" name="target_language" required>
                            <option value=""></option>
                            {% for translate_language in translate_languages %}
                            <option value="{{ translate_language.abbreviation|lower }}">
                                {% if request.LANGUAGE_CODE == 'fr' and translate_language.french_name %}
                                {{ translate_language.french_name }}
                                {% else %} {{ translate_language.name }}
                                {% endif %}
                            </option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="text-translate-domain-wrapper">
                        <select class="domain-select" name="domain_name" required>
                            <option value=""></option>
                        </select>
                    </div>
                </div>

                <div class="text-translate-editor-wrapper">
                    <div id="translated-text" class="text-translate-editor text-translate-editor-translated"></div>
                    <!-- Skeleton loader pour la traduction -->
                    <div id="translation-skeleton" class="text-translate-skeleton hidden">
                        <div class="skeleton-line skeleton-line-short"></div>
                        <div class="skeleton-line"></div>
                        <div class="skeleton-line skeleton-line-medium"></div>
                        <div class="skeleton-line"></div>
                        <div class="skeleton-line skeleton-line-short"></div>
                        <div class="skeleton-line skeleton-line-medium"></div>
                        <div class="skeleton-line"></div>
                        <div class="skeleton-line skeleton-line-short"></div>
                    </div>
                    <button type="button" id="btn-copy" class="text-translate-copy-btn copy hidden">
                        <i class="ph ph-copy text-translate-icon"></i>
                        <div id="tooltip" class="text-translate-tooltip">
                            <span class="text-translate-tooltip-text">{% trans 'Copied' %}</span>
                            <div class="text-translate-tooltip-arrow"></div>
                        </div>
                    </button>
                </div>
            </div>
        </div>

        <!-- Zone retour qualité (pleine largeur, lecture seule) -->
        <div id="quality-feedback-row" class="text-translate-quality-row hidden">
            <label class="text-translate-field-label">
                {% trans 'Translation quality feedback' %}
            </label>
            <div id="quality-feedback-content" class="text-translate-quality-content">
                <span id="quality-comments-text"></span>
            </div>
        </div>

        {% include 'common/subscription_error_overlay.html' %}

    </form>
</div>

<!-- Modal pour les instructions de traduction -->
<div id="instructions-modal" class="instructions-modal-overlay hidden">
    <div class="instructions-modal-card">
        <button type="button" id="close-instructions-modal" class="instructions-modal-close">
            <i class="ph ph-x"></i>
        </button>
        <div class="instructions-modal-body">
            <div class="instructions-modal-title">{% trans 'Custom translation instructions' %}</div>
            <textarea
                id="translation-instructions"
                name="instructions"
                class="text-translate-instructions-textarea"
                placeholder="{% trans 'e.g., Use formal legal tone, Preserve Latin terms, etc.' %}"
                rows="4"
                maxlength="2000"
            ></textarea>
            <div class="instructions-modal-actions">
                <button type="button" id="cancel-instructions" class="instructions-modal-btn instructions-modal-btn-cancel">
                    {% trans 'Cancel' %}
                </button>
                <button type="button" id="save-instructions" class="instructions-modal-btn instructions-modal-btn-save">
                    {% trans 'Save' %}
                </button>
            </div>
        </div>
    </div>
</div>
