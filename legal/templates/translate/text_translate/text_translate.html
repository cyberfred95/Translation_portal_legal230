{% load static %}
{% load i18n %}

<div class="pb-5 w-full h-full flex flex-col items-end">
    <form name="text-translate" class="w-full flex flex-col bg-white rounded-2 px-6 py-4">
        <textarea id="text" name="text" style="display: none;"></textarea>
        <input type="hidden" name="action" value="text_translate">
        {% csrf_token %}
        <div class="flex items-center justify-between mb-0 pr-2.5 pl-0 mb-0 border-solid border-b-0.25 border-gray-50">
            <div class="flex flex-1 gap-1 items-start">
                <!--
                @TODO : pacome 03/09/2025
                <button id="detect-language"
                        type="button"
                        class="text-3.5 flex gap-2.5 border-b-0.25 border-blue- items-center pr-7.5 py-0.5 bg-transparent font-medium text-gray-600 hover:text-white transition duration-300 ease-in-out">
                    {% trans 'Detect language' %}
                </button>-->
                <select class="source-language" name="source_language" required>
                    <option value=""></option>
                    {% for translate_language in translate_languages %}
                    <option value="{{ translate_language.abbreviation|lower }}">
                        {% if request.LANGUAGE_CODE == 'fr' and translate_language.french_name %}
                        {{ translate_language.french_name }}
                        {% else %} {{ translate_language.name }}
                        {% endif %}
                    </option>
                    {% endfor %}
                </select>
            </div>

            <div class="flex flex-1 items-start relative items-center justify-between w-100 pl-25">

                <select class="target-language" name="target_language" required>
                    <option value=""></option>
                    {% for translate_language in translate_languages %}
                    <option value="{{ translate_language.abbreviation|lower }}">
                        {% if request.LANGUAGE_CODE == 'fr' and translate_language.french_name %}
                        {{ translate_language.french_name }}
                        {% else %} {{ translate_language.name }}
                        {% endif %}
                    </option>
                    {% endfor %}
                </select>

                <div class="flex items-center justify-between">
                    <select class="domain-select" name="domain_name" required>
                        <option value=""></option>
                    </select>
                </div>

            </div>

        </div>
        <div class="flex w-full gap-1">
            <div class="w-full flex flex-col gap-4 item-center border-r-0.25 border-gray-100">
                <div class="relative">
                    <div id="source-text"
                         class="focus:border-transparent focus:ring-0 rounded-2.5 bg-white p-5 pr-10 text-gray-600 resize-none w-full placeholder:text-gray-300 overflow-hidden">
                    </div>

                    <button type="button" id="clear-source" class="absolute top-2 right-2 p-1 rounded shadow-none hover:shadow-none focus:ring-0 focus:outline-none">
                        <i class="ph ph-x text-2xl text-gray-500 hover:text-gray-700"></i>
                    </button>
                </div>

                <div class="flex justify-end px-5 justify-between items-center">
                    <div class="font-poppins text-gray-600">
                        <span id="source-char-count">0</span> / 2000
                    </div>
                    <div>
                        <button type="submit" id="btn-translate" disabled
                                class="rounded-full px-6.5 py-3 bg-green-800 opacity-100 hover:opacity-100 disabled:opacity-50 disabled:cursor-not-allowed text-white transition-colors duration-300">

                            <span class="text-3.5">{% trans 'Translate' %}</span>
                        </button>
                    </div>
                </div>


            </div>
            <div class="w-full flex flex-col gap-4">
                <div class="relative">
                    <div id="translated-text"
                         class="focus:ring-0 rounded-2.5 bg-white p-5 pr-15 text-gray-600 resize-none w-full placeholder:text-gray-300 overflow-hidden border border-gray-300">
                    </div>
                    <button type="button" id="btn-copy" class="copy absolute top-2 right-2 p-1 rounded shadow-none hover:shadow-none focus:ring-0 focus:outline-none hidden">
                        <i class="ph ph-copy text-2xl text-gray-500 hover:text-gray-700"></i>
                        <div id="tooltip"
                             class="invisible opacity-0 transition-opacity duration-300 absolute z-10 py-2.5 px-4 bg-gray-600 text-white text-2.75 rounded-md -top-12 -right-6 transform">
                            <span class="text-justify text-wrap block text-3">{% trans 'Copied' %}</span>
                            <div class="absolute w-3 h-3 bg-gray-600 transform rotate-45 left-1/2 -translate-x-1/2 -bottom-1.5"></div>
                        </div>
                    </button>
                </div>

            </div>
        </div>

    </form>
</div>
