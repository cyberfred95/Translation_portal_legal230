{% load static %}
{% load i18n %}
<header class="flex justify-between items-center bg-gray-600 px-31.25 py-7.5">
    <a href="/" class="w-30 h-7.25">
        <img src="{% static 'images/logo.png' %}" alt="Logo">
    </a>
    <div class="flex gap-5 items-center font-semibold">
                <span class="text-white">
                    {{ request.user.username }}
                </span>
        <div>
            <span class="en {% if request.LANGUAGE_CODE == 'en' %}text-white{% else %}text-gray-400 hover:text-green-700 transition duration-300 ease-in-out{% endif %} cursor-pointer">
                EN
            </span>
            |
            <span class="fr {% if request.LANGUAGE_CODE == 'fr' %}text-white{% else %}text-gray-400 hover:text-green-700 transition duration-300 ease-in-out{% endif %} cursor-pointer">
                FR
            </span>
        </div>
        <a href="/accounts/logout/" class="bg-green-700 text-white text-4 rounded-md py-2.5 px-6.5 transition duration-300 ease-in-out">

            {% trans 'Logout' %}
        </a>
    </div>
</header>
