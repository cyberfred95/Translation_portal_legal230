{% load static %}
{% load i18n %}

<header class="flex justify-end items-center px-31.25 py-5 border-b border-gray-600">
    <div class="flex gap-5 items-center font-semibold">
        <span class="text-gray-600">
            {{ request.user.username }}
        </span>
        <div class="text-green-700">
            <span class="en {% if request.LANGUAGE_CODE == 'en' %}text-gray-600{% else %}text-gray-400 hover:text-green-700 transition duration-300 ease-in-out{% endif %} cursor-pointer">
                EN
            </span>
            |
            <span class="fr {% if request.LANGUAGE_CODE == 'fr' %}text-gray-600{% else %}text-gray-400 hover:text-green-700 transition duration-300 ease-in-out{% endif %} cursor-pointer">
                FR
            </span>
        </div>
        <a href="/accounts/logout/" class="font-medium bg-green-700 text-white text-4 rounded-md py-1 px-6.5 transition duration-300 ease-in-out">
            {% trans 'Logout' %}
        </a>
    </div>
</header>
