            <div id="dropdown" class="z-10 hidden absolute top-10 left-0 bg-white rounded-2.5 border border-green-400 p-5">
                <ul class="flex flex-col items-start gap-7.5 font-normal whitespace-nowrap text-gray-600">
                    <li class="hover:text-green-400 cursor-pointer w-full">
                        <a href="{% url 'profile_details' %}" class="block w-full">Profile details</a>
                    </li>
                    <li class="hover:text-green-400 cursor-pointer w-full">
                        <a href="/billing-and-plans" class="block w-full">Billing and plans</a>
                    </li>
                    <li class="hover:text-green-400 cursor-pointer w-full">
                        <a href="/manage-users" class="block w-full">Manage users</a>
                    </li>
                </ul>
            </div>
        </div>

        <div class="text-green-700">
            <span class="en {% if request.LANGUAGE_CODE == 'en' %}text-white{% else %}text-gray-400 hover:text-green-700 transition duration-300 ease-in-out{% endif %} cursor-pointer">
                EN
            </span>
            |
            <span class="fr {% if request.LANGUAGE_CODE == 'fr' %}text-white{% else %}text-gray-400 hover:text-green-700 transition duration-300 ease-in-out{% endif %} cursor-pointer">
                FR
            </span>
        </div>
        <a href="/accounts/logout/"
           class="bg-green-700 text-white text-4 rounded-md py-2.5 px-6.5 transition duration-300 ease-in-out">
