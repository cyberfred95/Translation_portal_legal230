{% load static %}

<header class="flex justify-between items-center bg-gray-100 pl-31.25 pr-63.75 py-7.5">
    <div class="w-30 h-7.25">
        <img src="{% static 'images/logo.png' %}" alt="Logo">
    </div>
    <div class="flex gap-5 items-center font-semibold">
                <span class="text-gray-800">
                    {{ request.user.username }}
                </span>
        <div>
            <a href="/en" class="{% if request.LANGUAGE_CODE == 'en' %}text-gray-800{% else %}text-gray-400{% endif %}">
                EN
            </a>
            |
            <a href="/fr" class="{% if request.LANGUAGE_CODE == 'fr' %}text-gray-800{% else %}text-gray-400{% endif %}">
                FR
            </a>
        </div>
        <a href="/accounts/logout/" class="bg-green-700 text-white text-4 hover:bg-gray-700 rounded-md py-2.5 px-6.5 transition duration-300 ease-in-out">
            Logout
        </a>
    </div>
</header>
