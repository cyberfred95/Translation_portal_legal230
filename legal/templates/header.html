{% load static %}

<header class="flex justify-between items-center bg-gray-50 px-31.25 py-7.5">
    <a href="/" class="w-30 h-7.25">
        <img src="{% static 'images/logo.png' %}" alt="Logo">
    </a>
    <div class="flex gap-5 items-center font-semibold">
                <span class="text-gray-600">
                    {{ request.user.username }}
                </span>
        <div>
            <span class="en {% if request.LANGUAGE_CODE == 'en' %}text-gray-575{% else %}text-gray-400 hover:text-green-400 transition duration-300 ease-in-out{% endif %} cursor-pointer">
                EN
            </span>
            |
            <span class="fr {% if request.LANGUAGE_CODE == 'fr' %}text-gray-575{% else %}text-gray-400 hover:text-green-400 transition duration-300 ease-in-out{% endif %} cursor-pointer">
                FR
            </span>
        </div>
        <a href="/accounts/logout/" class="bg-green-400 text-white text-4 hover:bg-gray-550 rounded-md py-2.5 px-6.5 transition duration-300 ease-in-out">

            Logout
        </a>
    </div>
</header>
