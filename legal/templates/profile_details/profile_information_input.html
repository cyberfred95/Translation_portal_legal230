{% load static %}
{% load i18n %}

<!-- Reusable form input component -->
<div class="form-field">
    <label for="{{ field_id }}" class="form-label">
        {% trans field_label %}
    </label>
    {% if field_type == "select" %}
        <div class="select-wrapper">
            <select
                    name="{{ field_name }}"
                    id="{{ field_id }}"
                    class="form-select">
                {% for option_value, option_text in field_options %}
                    <option value="{{ option_value }}" {% if field_selected_value == option_value %}selected{% endif %}>
                        {{ option_value|upper }} - {{ option_text }}
                    </option>
                {% endfor %}
            </select>
            <!-- Chevron Down Icon -->
            <div class="select-chevron">
                <i class="ph ph-caret-down icon-16"></i>
            </div>
        </div>
    {% else %}
        <input
                type="{{ field_type }}"
                name="{{ field_name }}"
                id="{{ field_id }}"
                value="{{ field_value }}"
                class="form-input"
        />
    {% endif %}
</div>
