{% load static %}
{% load i18n %}

<!-- Reusable form input component -->
<div class="space-y-1">
    <label for="{{ field_id }}" class="text-sm font-semibold text-gray-900 tracking-[-0.084px] leading-6">
        {% trans field_label %}
    </label>
    {% if field_type == "select" %}
        <div class="relative">
            <select
                    name="{{ field_name }}"
                    id="{{ field_id }}"
                    class="h-10 rounded-md border border-black/10 bg-white text-sm font-normal text-gray-900 tracking-[-0.084px] leading-6 focus:outline-none focus:ring-1 focus:ring-gray-900 px-3 w-full appearance-none pr-10">
                {% for option_value, option_text in field_options %}
                    <option value="{{ option_value }}" {% if field_selected_value == option_value %}selected{% endif %}>
                        {{ option_value|upper }} - {{ option_text }}
                    </option>
                {% endfor %}
            </select>
            <!-- Chevron Down Icon -->
            <div class="absolute inset-y-0 right-3 flex items-center pointer-events-none">
                <svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                </svg>
            </div>
        </div>
    {% else %}
        <input
                type="{{ field_type }}"
                name="{{ field_name }}"
                id="{{ field_id }}"
                value="{{ field_value }}"
                class="h-10 rounded-md border border-black/10 bg-white text-sm font-normal text-gray-900 tracking-[-0.084px] leading-6 focus:outline-none focus:ring-1 focus:ring-gray-900 px-3 w-full"
        />
    {% endif %}
</div>
