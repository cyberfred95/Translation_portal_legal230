{% load static %}
{% load i18n %}

<!-- Main Container -->
<!-- Security Content Card -->
<div class="w-full flex flex-col items-start gap-8">

    <!-- Change Password Section -->
    <div class="w-full flex flex-col sm:flex-row sm:justify-between sm:items-end gap-4 sm:gap-6">
        <div class="flex flex-col justify-center items-start gap-2">
            <h3 class="text-base font-normal text-[#181932] leading-6 tracking-[-0.176px]">
                {% trans 'Password' %}
            </h3>
            <p class="text-sm font-normal text-[#5A5A78] leading-6 tracking-[-0.084px]">
                {% trans 'Change your password.' %}
            </p>
        </div>
        <a href="{% url 'forgot-password' %}" class="flex items-center justify-center gap-2 px-2.5 py-2 rounded-full border border-black/10 bg-white hover:bg-gray-50 transition-colors duration-200 group">
            <svg class="w-6 h-6 text-black/80 group-hover:text-black transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
            </svg>
            <span class="px-2 text-sm font-semibold text-[#181932] leading-6 tracking-[-0.084px]">
                    {% trans 'Change Password' %}
                </span>
        </a>
    </div>




</div>
