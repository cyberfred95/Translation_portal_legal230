{% load i18n %}
{% load static %}
<!DOCTYPE html>
<html lang="{{ request.LANGUAGE_CODE }}">
<head>
        <meta charset="UTF-8">
        <title>{% block title %}Legal230{% endblock %}</title>
        <!-- FAVICONS -->
        <link rel="shortcut icon" href="{% static 'favicon.ico' %}">
        <link rel="icon" type="image/x-icon" href="{% static 'favicon.ico' %}" sizes="16x16 32x32 48x48">
        <link rel="icon" type="image/png" href="{% static 'favicon-16.png' %}" sizes="16x16">
        <link rel="icon" type="image/png" href="{% static 'favicon-32.png' %}" sizes="32x32">
        <link rel="icon" type="image/png" href="{% static 'favicon-48.png' %}" sizes="48x48">
        <link rel="icon" type="image/png" href="{% static 'favicon-180.png' %}" sizes="180x180">
        <link rel="icon" type="image/png" href="{% static 'favicon-192.png' %}" sizes="192x192">
        <link rel="icon" type="image/png" href="{% static 'favicon-512.png' %}" sizes="512x512">
        <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
        <script src="https://code.jquery.com/jquery-2.2.4.min.js"
            integrity="sha256-BbhdlvQf/xTY9gja0Dq3HiwQF8LaCRTXxZKRutelT44=" crossorigin="anonymous"></script>
        <link href="{% static 'css/main.css' %}" rel="stylesheet">
        <script src="https://cdn.tailwindcss.com"></script>
        <script src="{% static 'js/tailwind-config.js' %}"></script>
        <script src="https://unpkg.com/@phosphor-icons/web"></script>
        {% block head_extra %}{% endblock %}
</head>
<body>
{% block content %}{% endblock %}
{% block body_end %}{% endblock %}
</body>
</html>
