<!DOCTYPE html>
{% load i18n %}
{% load static %}
<html lang="{{ request.LANGUAGE_CODE }}">
<head>
    <meta charset="UTF-8">
    <title>Legal230</title>
    <!-- FONTS -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- JQUERY -->
    <script src="https://code.jquery.com/jquery-2.2.4.min.js"
            integrity="sha256-BbhdlvQf/xTY9gja0Dq3HiwQF8LaCRTXxZKRutelT44=" crossorigin="anonymous"></script>
    <!-- STYLES -->
    <link href="{% static 'css/main.css' %}" rel="stylesheet">
    <!-- TAILWIND -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- TAILWIND CONFIG (externalized) -->
    <script src="{% static 'js/tailwind-config.js' %}"></script>
</head>
<body>
<div class="flex items-center justify-center min-h-screen bg-gray-100">
    <form name="reset-password" method="post" action="{% url 'reset-password' %}" autocomplete="off"
          class="flex flex-col bg-white shadow-lg py-17.5 px-32.5 rounded-5">
        <h2 class="text-6 font-bold mb-2.5 text-center">SET A NEW PASSWORD</h2>
        {% csrf_token %}
        <input type="hidden" name="email" id="email" {% if email %} value="{{ email }} {% endif %}">
        <input
                type="password"
                placeholder="Set a new password"
                id="password"
                name="password"
                required
                class="min-w-100 text-3.5 bg-gray-75 px-3.5 py-3.5 border rounded-2.5 focus:outline-none focus:ring focus:ring-none">
        <p class="error-message text-red-400 text-3 mt-2.5 hidden"></p>
        <button
                type="submit"
                class="my-5 font-semibold bg-green-700 py-2 text-4 text-white rounded-7 hover:bg-gray-600 duration-300 ease-in-out">
            Set new password
        </button>
    </form>
</div>


<script src="{% static 'js/authorization.js' %}"></script>
<script src="{% static 'js/get-cookie.js' %}"></script>

</body>
</html>
