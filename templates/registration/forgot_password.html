<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Forgot password</title>
</head>
<body>
<form method="post" action="{% url 'forgot-password' %}">
    {% csrf_token %}
    <input type="email" name="email" id="email" placeholder="Enter email">
    <button type="submit">Submit</button>
</form>

</body>
</html>
